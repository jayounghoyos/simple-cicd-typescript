<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sum Two Numbers :) </title>
</head>
<body>
  <h1>Simple Calculator</h1>
  <input type="number" id="num1" placeholder="First number" />
  <select id="operation">
    <option value="+">+</option>
    <option value="-">−</option>
    <option value="*">×</option>
    <option value="/">÷</option>
  </select>
  <input type="number" id="num2" placeholder="Second number" />
  <button type="button" id="btnCalculate">Calculate</button>
  <p>Result: <strong id="result">—</strong></p>

  <!-- Link to the compiled JS (compile sum.ts with: tsc sum.ts) -->
  <script src="sum.js"></script>
  <script>
    document.getElementById('btnCalculate').addEventListener('click', function () {
      var a = Number(document.getElementById('num1').value) || 0;
      var b = Number(document.getElementById('num2').value) || 0;
      var op = document.getElementById('operation').value;
      var resultText;

      try {
        if (op === '+') {
          resultText = window.sum(a, b);
        } else if (op === '-') {
          resultText = window.subtract(a, b);
        } else if (op === '*') {
          resultText = window.multiply(a, b);
        } else if (op === '/') {
          resultText = window.divide(a, b);
        }
      } catch (e) {
        resultText = 'Error: ' + (e && e.message ? e.message : 'Invalid operation');
      }

      document.getElementById('result').textContent = String(resultText);
    });
  </script>
</body>
</html>
